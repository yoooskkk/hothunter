version: "3.9"

services:
  freqtrade:
    image: freqtradeorg/freqtrade:2026.5.1
    container_name: hothunter
    restart: unless-stopped
    volumes:
      - ./strategies:/freqtrade/user_data/strategies:ro
      - ./configs:/freqtrade/user_data/configs:ro
      - ./data:/freqtrade/user_data/data
      - ./scripts:/freqtrade/user_data/scripts:ro
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - TZ=Asia/Tokyo
    env_file:
      - .env
    command: >
      trade
      --config /freqtrade/user_data/configs/config.dry.json
      --strategy HotHunterStrategy
      --db-url sqlite:////freqtrade/user_data/data/hothunter.dry.sqlite
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
